<!DOCTYPEhtml>
<html lang="pt-br">
<head>
<metacharset="UTF-8">
<metaname="viewport"content="width=device-width, initial-scale=1.0">
<title>Formulário Completo</title>
</head>
<body>
<h1>Formulário Completo de Contato</h1>
<form action="processo.php"method="POST" autocomplete="on">
<fieldset>
<legend>Informações Pessoais</legend>
<!--Nome -->
<label for="nome">Nome:</label><br>
<input type="text" id="nome"name="nome" placeholder="Digite seu 
nome" requiredautofocus maxlength="50"><br><br
<label for="idade">Idade:</label><br>
<input type="number"id="idade"name="idade" min="12"max="20"
value="15"required><br><br>
 <label for="endereco">Endereço:</label><br>
<input type="text" id="endereco"name="endereco" placeholder="Rua, 
Número, Bairro"><br><br>
 
<label for="cep">CEP:</label><br>
<input type="text" id="cep"name="cep"pattern="\d{5}-?\d{3}"
title="Digite no formato 12345-678" required><br><br>
<!--Celular -->
<label for="celular">Celular:</label><br>
<input type="tel"id="celular"name="celular" placeholder="(XX) 
XXXXX-XXXX"pattern="\([0-9]{2}\) [0-9]{5}-[0-9]{4}" title="Digite no formato 
(XX) XXXXX-XXXX" required><br><br>
<!--E-mail -->
<label for="email">E-mail:</label><br>
<input type="email"id="email"name="email"
placeholder="exemplo@dominio.com"requiredautocomplete="off"><br><br>
<!--Datas e Horários -->
<label for="data">Data:</label><br>
<input type="date" id="data"name="data" required><br><br>
<label for="semana">Semana:</label><br>
<input type="week" id="semana"name="semana"><br><br>
<label for="hora">Hora:</label><br>
<input type="time" id="hora"name="hora"><br><br>
<!--Cor -->
<label for="cor">Escolha uma cor:</label><br>
<input type="color"id="cor"name="cor"value="#ff0000"><br><br>
<!--Identificação curta -->
<label for="idi">Identificação:</label><br>
<input type="text" id="idi"name="idi"placeholder="Até 5 
caracteres"maxlength="5"><br><br> 
<!--Campos de controle (leitura e desabilitado) -->
<label for="leitura">Campo somente leitura:</label><br>
<input type="text" id="leitura"name="leitura"value="Somente 
leitura" readonly><br><br>
<label for="desabilitado">Campo desabilitado:</label><br>
<input type="text" id="desabilitado"name="desabilitado" value="Não 
editável"disabled><br><br>
<!--Botões de Ação -->
<inpu ttype="submit"value="Enviar">
<inpu ttype="reset"value="Limpar">
<button type="button">Clique Aqui</button>
</fieldset>
</form>
</body>
</htmlss
